enabled: true

meeting_place:
  enabled: true
  name: "KairosChain Meeting Place"
  max_agents: 100
  session_timeout: 3600
  registry_path: storage/agent_registry.json

  # Public web surface — mounted by PlaceRouter under /place/web/* and
  # /place/api/v1/* (Slice 2 Part C). place_host anchors public links and the
  # ANC-7 verification address place://<place_host>/anchor/<slug>.
  web_ui:
    enabled: true
    place_host: meeting.genomicschain.io
    place_url: https://meeting.genomicschain.io

  # Anchor attestation capability (ANC-1..9 / BRD-1..4). Enabled on this place
  # because it hosts the constitutive-note / GenomicsChain provenance anchors.
  # Storage lands under the persisted data volume (.kairos/storage/).
  anchoring:
    enabled: true
    per_identity: 60
    aggregate: 600
    window_seconds: 3600

chain:
  enabled: true
  backend: private
  private:
    storage_path: storage/hestia_anchors.json
    max_anchors: 100000

trust_anchor:
  record_exchanges: true
  record_registrations: true
  record_fadeouts: true
