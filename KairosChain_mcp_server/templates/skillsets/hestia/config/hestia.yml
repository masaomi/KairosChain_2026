# HestiaChain SkillSet Configuration
# Part of the KairosChain Meeting Place Server (Phase 4)

# Master switch for the HestiaChain SkillSet
enabled: false

# Meeting Place Server configuration (Phase 4B)
meeting_place:
  enabled: false
  name: "KairosChain Meeting Place"
  max_agents: 100
  session_timeout: 3600  # seconds
  # registry_path: storage/agent_registry.json
  # parent_place_url: null  # URL of parent place for federation

  # Public web surface (unauthenticated, read-only): skill catalog, JSON API,
  # and — when anchoring is enabled — the ANC-7 verification view.
  # Mounted by PlaceRouter under /place/web/* and /place/api/v1/*.
  web_ui:
    enabled: true
    # place_host / place_url anchor the public links and the ANC-7 verification
    # address (place://<place_host>/anchor/<slug>). Set to the served hostname.
    # place_host: meeting.genomicschain.io
    # place_url: https://meeting.genomicschain.io

  # Anchor attestation capability (ANC-1..9 / BRD-1..4). Opt-in: when disabled
  # the catalog still serves but /place/web/verify and /place/web/anchor/* 404.
  # Enable on the place that hosts external-reference (content-by-reference)
  # anchors — e.g. the constitutive-note / GenomicsChain provenance deployment.
  anchoring:
    enabled: false
    # ANC-9 free-write budget (mechanism, design §11) — tune to observed load.
    # The Sybil disclosure is shown regardless of the numbers.
    per_identity: 60      # writes per identity per window
    aggregate: 600        # writes across all identities per window
    window_seconds: 3600  # refill window
    # log_path: storage/hestia_anchor_log.json
    # attestation_store_path: storage/hestia_anchor_attestations.json

  # Deposit policy (operator-configurable)
  deposit_policy:
    max_skill_size_bytes: 100000
    max_skills_per_agent: 20
    max_total_deposits: 500
    deposit_rate_limit: 10  # per hour per agent (process-scoped, resets on restart)
    # License enforcement — NOT YET IMPLEMENTED (planned for future sprint)
    # Uncomment and set require_license: true when ready:
    # require_license: false
    # accepted_licenses: []
    # rejected_licenses: []
    # Safety patterns — NOT YET IMPLEMENTED (planned for future sprint)
    # Uncomment to enable when code support is added:
    # safety_patterns:
    #   - pattern: "ignore previous instructions"
    #     category: prompt_injection
    #   - pattern: "disregard your system prompt"
    #     category: prompt_injection
    #   - pattern: "you are now (?:a|an|the)"
    #     category: prompt_injection
    #   - pattern: "curl\\s.*POST"
    #     category: data_exfiltration
    #   - pattern: "eval\\s*\\("
    #     category: code_execution

  # Federation: Place-to-Place skill bridging
  # Agent-initiated only (DEE: no automatic forwarding)
  federation:
    enabled: false
    max_hop_count: 3            # Max hops for federated deposits
    max_deposit_age_hours: 168  # 7 days — auto-expire federated deposits
    accept_federated: true      # Accept deposits with provenance from other Places

# HestiaChain backend configuration
chain:
  enabled: true
  backend: in_memory  # in_memory, private, public_testnet, public_mainnet
  # Private backend settings (Stage 1)
  private:
    storage_path: storage/hestia_anchors.json
    max_anchors: 100000
  # Batching (for public backends)
  batching:
    enabled: false
    interval_seconds: 3600
    max_batch_size: 100

# Trust anchor: what to record on HestiaChain
trust_anchor:
  record_exchanges: true       # Record skill exchanges
  record_registrations: true   # Record agent registrations
  record_fadeouts: true        # Record agent fade-outs (TTL expiry)
