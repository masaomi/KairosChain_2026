# Agent SkillSet configuration
llm_model: claude-sonnet-4-6
provider: null  # uses llm_client default

# Per-phase budgets
phases:
  orient:
    max_llm_calls: 10
    max_tool_calls: 20
  decide_prep:
    max_llm_calls: 3
    max_tool_calls: 5
  decide:
    max_llm_calls: 5
    max_tool_calls: 0      # run_decide passes tools: [] — no tool_use
    max_repair_attempts: 3  # must be <= max_llm_calls
  reflect:
    max_llm_calls: 3
    max_tool_calls: 0

# Default policy
tool_blacklist:
  - "agent_*"
  - "autonomos_*"
  - "skills_evolve"
  - "skills_rollback"
  - "skills_promote"
  - "instructions_update"
  - "token_manage"
  - "system_upgrade"
  - "chain_import"
  - "multiuser_*"
  - "chain_migrate_*"
  - "chain_export"
  - "challenge_*"
  - "autoexec_plan"
  - "autoexec_run"
  # MCP client: user-only (requires token)
  - "mcp_connect"
  - "mcp_disconnect"

# Additional tools available during ORIENT phase (opt-in from SkillSets).
# Adding tools here increases the set the LLM can call during ORIENT;
# the per-phase budget (max_tool_calls) is unchanged.
orient_tools_extra: []
  # - document_status   # uncomment to enable draft checking during ORIENT

# Autonomous mode limits
autonomous:
  max_total_llm_calls: 60        # across all cycles in one batch
  max_duration_seconds: 300      # wall-clock timeout per batch (5 min)
  min_cycles_before_exit: 2      # confidence exit disabled for first N cycles
  confidence_exit_threshold: 0.9 # minimum confidence for early exit

# Audit
audit_level: summary
