# Agent SkillSet configuration
llm_model: claude-sonnet-4-6
provider: null  # uses llm_client default

# Per-phase budgets
phases:
  orient:
    max_llm_calls: 10
    max_tool_calls: 20
  decide_prep:
    max_llm_calls: 3
    max_tool_calls: 5
  decide:
    max_llm_calls: 5
    max_tool_calls: 0      # run_decide passes tools: [] — no tool_use
    max_repair_attempts: 3  # must be <= max_llm_calls
  reflect:
    max_llm_calls: 3
    max_tool_calls: 0
  review:
    max_llm_calls: 5
    max_tool_calls: 0
    max_repair_attempts: 1

# Default policy
tool_blacklist:
  - "agent_*"
  - "autonomos_*"
  - "skills_evolve"
  - "skills_rollback"
  - "skills_promote"
  - "instructions_update"
  - "token_manage"
  - "system_upgrade"
  - "chain_import"
  - "multiuser_*"
  - "chain_migrate_*"
  - "chain_export"
  - "challenge_*"
  - "autoexec_plan"
  - "autoexec_run"
  - "agent_execute"
  # MCP client: user-only (requires token)
  - "mcp_connect"
  - "mcp_disconnect"

# Feature toggles for OODA enhancements (v1.1c)
# Each enhancement can be independently enabled/disabled.
# Disabled = existing code path, no behavior change.
features:
  active_observe: false    # Enhancement A (default: false = legacy observe)
  task_dag: false          # Enhancement B (default: false = linear progress)
  error_taxonomy: true     # Enhancement C (default: true = low risk, drop-in)
  phase_tool_filter: true  # Enhancement D (default: true = low risk, config-only)

# Per-phase tool filtering (Enhancement D).
# When features.phase_tool_filter is true, each OODA phase gets a restricted
# InvocationContext derived from the session context.
# 'include' = whitelist (fnmatch patterns). Empty or absent = no restriction.
# 'exclude' = additional blacklist entries for this phase.
# Parent blacklist always takes precedence (cannot whitelist a blacklisted tool).
phase_tools:
  observe:
    include: [knowledge_*, chain_*, resource_*, state_status,
              meeting_place_status, mcp_list_remote, skills_list,
              introspection_health]
  orient:
    include: [knowledge_*, chain_history, resource_read,
              context_save, mcp_list_remote]
  decide:
    include: []   # No tools — DECIDE is pure LLM reasoning
  reflect:
    include: []   # No tools — REFLECT is pure LLM reasoning

# Additional tools available during ORIENT phase (opt-in from SkillSets).
# Adding tools here increases the set the LLM can call during ORIENT;
# the per-phase budget (max_tool_calls) is unchanged.
# NOTE: When phase_tool_filter is enabled, orient_tools_extra tools must also
# appear in phase_tools.orient.include to be available.
orient_tools_extra: []
  # - document_status   # uncomment to enable draft checking during ORIENT

# Autonomous mode limits
autonomous:
  max_total_llm_calls: 60        # across all cycles in one batch
  max_duration_seconds: 300      # wall-clock timeout per batch (5 min)
  min_cycles_before_exit: 2      # confidence exit disabled for first N cycles
  confidence_exit_threshold: 0.9 # minimum confidence for early exit

# agent_execute: Claude Code subprocess delegation for file operations
agent_execute:
  default_tools: ["Read", "Edit", "Write", "Glob", "Grep"]
  default_model: "sonnet"
  default_timeout: 120
  max_timeout: 600
  default_budget_usd: 0.50
  max_budget_usd: 2.00

# Complexity-driven review (Gate 5.5 / Gate 6.5)
complexity_review:
  enabled: true
  personas: [pragmatic, skeptic]              # default personas for review
  high_personas: [kairos, pragmatic, skeptic] # personas for high complexity
  max_review_retries: 2                       # max re-DECIDE from review feedback
  # review_budget_llm is controlled by phases.review.max_llm_calls (above)
  l0_always_checkpoint: true                  # L0 changes always pause for human
  post_act_review: true                       # enable medium-complexity post-ACT review
  # Multi-LLM review integration (Gate 5.5c)
  multi_llm_review:
    enabled: false              # opt-in: enable for multi-LLM review during autonomous mode
    trigger_on:                 # complexity signals that trigger multi-LLM review
      - l0_change
      - design_scope
    max_concurrent: 2           # override Dispatcher default
    timeout_seconds: 300
    # Reviewer roster delegates to multi_llm_review/config/multi_llm_review.yml

# Audit
audit_level: summary
