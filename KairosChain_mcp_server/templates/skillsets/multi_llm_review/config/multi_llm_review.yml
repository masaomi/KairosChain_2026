# Multi-LLM Review SkillSet configuration
#
# This is the canonical reviewer roster. agent.yml delegates here
# to avoid duplication.

# Convergence rules
# Roster has 5 reviewers (claude_team_opus4.7, claude_cli_opus4.6,
# codex_gpt5.4, codex_gpt5.5, cursor_composer2). Rules are ratio-based
# (parser interprets "N/M" as N/M fraction applied to successful count),
# so the literal numerator/denominator is informational; what matters is
# the ratio.
convergence_rule: "3/5 APPROVE"  # 60% of successful reviewers must APPROVE
min_quorum: 2                    # minimum successful reviews for any verdict

# Self-referential orchestrator exclusion.
# When the caller passes orchestrator_model (e.g. "claude-opus-4-7"), any
# roster entry with that exact model is dropped before dispatch — the
# orchestrator should not review its own output.
# When at least one entry is excluded, convergence_rule_after_exclusion
# replaces convergence_rule for that dispatch (4 reviewers → 3 reviewers
# makes "3/4 APPROVE" require unanimity, which is too strict).
exclude_orchestrator_model: true

# Default orchestrator_strategy when the caller does not specify one.
# "delegate" (default): orchestrator runs persona Agent Team review in its own
#   context, in parallel with subprocess reviewers (detached worker). Empirically
#   same-model persona review still surfaces findings subprocess-only misses
#   because LLM metacognition is structurally limited.
# "exclude": legacy behavior — drop the matching reviewer entirely.
# "subprocess": spawn fresh claude -p for the matching reviewer.
default_orchestrator_strategy: "delegate"
# After excluding 1 orchestrator from 5 → 4 reviewers. Maintain the same
# 60% ratio (ceil(4 * 0.6) = 3 → 3 of 4 must APPROVE).
convergence_rule_after_exclusion: "3/4 APPROVE"

# Two-phase delegation (orchestrator_strategy: "delegate").
# Phase 1 dispatches subprocess reviewers synchronously, persists their
# results under a UUID v4 token, and returns a delegation manifest.
# Phase 2 (multi_llm_review_collect) receives the orchestrator's persona
# team review and computes final consensus.
delegation:
  collect_deadline_seconds: 1800 # how long the orchestrator has to call collect (30min — interactive runs often have user dialogue between Phase 1 and collect)
  retain_collected_seconds: 3600 # how long collected results stay for idempotent replay
  # v0.3.0 parallel subprocess worker (Phase 11.5). When default:true, Phase 1
  # returns a delegation_pending token immediately and a detached OS worker
  # runs subprocess reviewers in parallel with orchestrator persona Agents.
  # Budget constraint:
  #   collect_max_wait_seconds >
  #     main_call_max_timeout_seconds + main_call_timeout_margin_seconds
  #     + poll_interval_seconds × 20
  # else healthy long reviewers get reaped as worker_timeout.
  parallel:
    default: true
    startup_grace_seconds: 30
    heartbeat_interval_seconds: 2
    heartbeat_stale_threshold_seconds: 15      # pulse-based liveness ceiling
    tick_stale_threshold_seconds: 30           # main-thread liveness (pulse gating)
    collect_max_wait_seconds: 420              # R4 C3a: > worker pulse budget
    poll_interval_seconds: 0.5
    suspend_detection_jump_seconds: 5
    worker_log_max_bytes: 1048576
    worker_log_rotate_check_seconds: 1
    reaper_graceful_wait_seconds: 3
    reaper_esrch_confirm_count: 2
    worker_self_timeout_multiplier: 1.5
    worker_self_timeout_floor_seconds: 60
    main_call_max_timeout_seconds: 300
    main_call_timeout_margin_seconds: 60

# Dispatch settings
timeout_seconds: 300              # global deadline for all reviewers
max_concurrent: 2                 # semaphore limit (2 for laptop, 4 for CI)

# Reviewer roster
# Each entry specifies a provider (maps to llm_client adapter), optional model,
# and optional effort level. role_label is used in consensus output.
#
# Default effort per reviewer (medium baseline). When the multi_llm_review
# tool receives a `complexity` argument (or auto-detects it), these defaults
# are overridden per-dispatch by the effort_map below.
reviewers:
  - provider: claude_code
    model: claude-opus-4-7
    effort: medium
    role_label: claude_team_opus4.7

  - provider: claude_code
    model: claude-opus-4-6
    effort: medium
    role_label: claude_cli_opus4.6

  - provider: codex
    model: gpt-5.4
    effort: medium
    role_label: codex_gpt5.4

  # GPT-5.5 added 2026-04-24 for benchmarking against gpt-5.4. Both codex
  # entries dispatch via the same `codex exec` CLI; the adapter passes
  # `-m <model>` so the response can be attributed per-model.
  - provider: codex
    model: gpt-5.5
    effort: medium
    role_label: codex_gpt5.5

  - provider: cursor
    role_label: cursor_composer2
    # No `model` key → cursor adapter omits --model → cursor's default (composer2).
    # This entry preserves the original 5-reviewer roster behavior.

  # ----------------------------------------------------------------------
  # Multi-model cursor option (Phase 12 PR3-β, available since v3.22.1).
  # cursor_adapter passes --model when set. To run all reviewers via Cursor
  # (e.g., when only Cursor login is available), add entries below and
  # disable other providers' entries above. Models supported by `agent`
  # depend on your Cursor subscription/CLI version. Verified examples:
  #   - composer-2 (default; no --model needed)
  #   - gpt-5.4-high
  #   - claude-sonnet-4-6 (if available)
  # role_label is what shows up in convergence output.
  # ----------------------------------------------------------------------
  # - provider: cursor
  #   model: gpt-5.4-high
  #   role_label: cursor_gpt5.4
  # - provider: cursor
  #   model: claude-sonnet-4-6
  #   role_label: cursor_sonnet4.6

# Complexity → per-provider effort mapping.
# multi_llm_review tool auto-detects complexity from review_type + artifact size,
# or accepts an explicit `complexity` input. The mapped effort overrides the
# reviewer roster's default.
effort_map:
  low:
    claude_code: low
    codex: low
  medium:
    claude_code: medium
    codex: medium
  high:
    claude_code: high
    codex: high
  critical:
    claude_code: xhigh
    codex: high  # codex max is "high"

# Auto-detection thresholds (used when complexity arg not given)
auto_complexity:
  small_artifact_chars: 500    # <= this → complexity=low
  large_artifact_chars: 5000   # > this → complexity=high
  # Documents can be philosophically deep; default to medium not low.
  # Size-based rules still apply (very short doc → low, very long doc → high).
  document_review_type: medium
  design_review_type: high     # review_type=design → complexity=high

# Review context default
# 'independent' = reviewers don't see CLAUDE.md, project instructions
# 'project_aware' = reviewers see project context (use for project-specific reviews)
default_review_context: independent
