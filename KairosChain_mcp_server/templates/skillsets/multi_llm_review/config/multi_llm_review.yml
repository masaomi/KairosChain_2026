# Multi-LLM Review SkillSet configuration
#
# This is the canonical reviewer roster. agent.yml delegates here
# to avoid duplication.

# Convergence rules
# Roster has 6 reviewers (claude_team_fable5, claude_cli_opus4.6,
# claude_cli_opus4.8, codex_gpt5.4, codex_gpt5.5, cursor_composer2.5).
# Rules are ratio-based (parser interprets "N/M" as N/M fraction applied
# to successful count), so the literal numerator/denominator is
# informational; what matters is the ratio.
convergence_rule: "4/6 APPROVE"  # ceil(6 * 0.6) = 4 of the 6-reviewer roster
min_quorum: 2                    # minimum successful reviews for any verdict

# Self-referential orchestrator exclusion.
# When the caller passes orchestrator_model (e.g. "claude-fable-5"), any
# roster entry with that exact model is dropped before dispatch — the
# orchestrator should not review its own output.
# Under the "exclude" strategy, when at least one entry is excluded,
# convergence_rule_after_exclusion replaces convergence_rule for that
# dispatch (the literal rule for the full roster would otherwise be too
# strict for the reduced count). The "subprocess" strategy keeps the full
# roster; the default "delegate" strategy re-adds the slot at collect, so
# the full-roster rule governs there.
exclude_orchestrator_model: true

# Default orchestrator_strategy when the caller does not specify one.
# "delegate" (default): orchestrator runs persona Agent Team review in its own
#   context, in parallel with subprocess reviewers (detached worker). Empirically
#   same-model persona review still surfaces findings subprocess-only misses
#   because LLM metacognition is structurally limited.
# "exclude": legacy behavior — drop the matching reviewer entirely.
# "subprocess": spawn fresh claude -p for the matching reviewer.
default_orchestrator_strategy: "delegate"
# After excluding 1 orchestrator from 6 → 5 reviewers. Same ceil(N * 0.6)
# majority basis (ceil(5 * 0.6) = 3 → 3 of 5 must APPROVE). Note the two
# rules are not the same literal ratio (4/6 ≈ 0.67 vs 3/5 = 0.60); since the
# parser applies the ratio to the successful count, the full-roster rule is
# slightly stricter when some reviewers fail. Accepted as-is.
# Applies to the "exclude" strategy only — "subprocess" keeps the full
# roster, and "delegate" re-adds the orchestrator slot at collect, so the
# full-roster rule (4/6) governs both (verified live 2026-06-10).
convergence_rule_after_exclusion: "3/5 APPROVE"

# Two-phase delegation (orchestrator_strategy: "delegate").
# Phase 1 dispatches subprocess reviewers synchronously, persists their
# results under a UUID v4 token, and returns a delegation manifest.
# Phase 2 (multi_llm_review_collect) receives the orchestrator's persona
# team review and computes final consensus.
delegation:
  collect_deadline_seconds: 1800 # how long the orchestrator has to call collect (30min — interactive runs often have user dialogue between Phase 1 and collect)
  retain_collected_seconds: 3600 # how long collected results stay for idempotent replay
  # v0.3.0 parallel subprocess worker (Phase 11.5). When default:true, Phase 1
  # returns a delegation_pending token immediately and a detached OS worker
  # runs subprocess reviewers in parallel with orchestrator persona Agents.
  # Budget constraint:
  #   collect_max_wait_seconds >
  #     main_call_max_timeout_seconds + main_call_timeout_margin_seconds
  #     + poll_interval_seconds × 20
  # else healthy long reviewers get reaped as worker_timeout.
  parallel:
    default: true
    startup_grace_seconds: 30
    heartbeat_interval_seconds: 2
    heartbeat_stale_threshold_seconds: 15      # pulse-based liveness ceiling
    tick_stale_threshold_seconds: 30           # main-thread liveness (pulse gating)
    collect_max_wait_seconds: 420              # R4 C3a: > worker pulse budget
    poll_interval_seconds: 0.5
    suspend_detection_jump_seconds: 5
    worker_log_max_bytes: 1048576
    worker_log_rotate_check_seconds: 1
    reaper_graceful_wait_seconds: 3
    reaper_esrch_confirm_count: 2
    worker_self_timeout_multiplier: 1.5
    worker_self_timeout_floor_seconds: 60
    main_call_max_timeout_seconds: 300
    main_call_timeout_margin_seconds: 60
    # multi_llm_review_wait tool (Phase 1.5) — see tools/multi_llm_review_wait.rb
    wait_poll_interval_seconds: 1.0           # wait tool polling cadence (separate from collect's 0.5s)
    wait_max_default_seconds: 600             # default per-call blocking ceiling
    wait_max_hard_cap_seconds: 1800           # per-call hard cap (clamps max_wait_seconds arg)
    wait_still_pending_streak_limit: 3        # consecutive still_pending returns before crashed/wait_exhausted

# Dispatch settings
timeout_seconds: 600              # global deadline for all reviewers
                                  # (raised 300 -> 600 on 2026-06-10: live 6-roster
                                  # run took 381s wall-clock with max_concurrent: 2)
max_concurrent: 2                 # semaphore limit (2 for laptop, 4 for CI)

# Reviewer roster
# Each entry specifies a provider (maps to llm_client adapter), optional model,
# and optional effort level. role_label is used in consensus output.
#
# Default effort per reviewer (medium baseline). When the multi_llm_review
# tool receives a `complexity` argument (or auto-detects it), these defaults
# are overridden per-dispatch by the effort_map below.
reviewers:
  # Orchestrator slot. With orchestrator_strategy "delegate" (the default),
  # this entry is replaced by the orchestrator's own persona Agent Team
  # review when orchestrator_model matches. Updated 2026-06-10: Fable 5
  # replaces Opus 4.7 as the session default model.
  - provider: claude_code
    model: claude-fable-5
    effort: medium
    role_label: claude_team_fable5

  - provider: claude_code
    model: claude-opus-4-6
    effort: medium
    role_label: claude_cli_opus4.6

  # Opus 4.8 added 2026-06-10, replacing Opus 4.7 in the roster. Rationale:
  # 4.7's register (strictness / systematizing) is covered by its direct
  # successor 4.8 and by Fable 5; 4.6 stays for its documented complementary
  # bias (ambiguity-preserving, self-reference-friendly). 4.8's reviewer
  # bias profile is not yet calibrated — record (a)/(b)/(c) breakdowns per
  # round (see multi_llm_reviewer_evaluation) until a profile accumulates.
  - provider: claude_code
    model: claude-opus-4-8
    effort: medium
    role_label: claude_cli_opus4.8

  - provider: codex
    model: gpt-5.4
    effort: medium
    role_label: codex_gpt5.4

  # GPT-5.5 added 2026-04-24 for benchmarking against gpt-5.4. Both codex
  # entries dispatch via the same `codex exec` CLI; the adapter passes
  # `-m <model>` so the response can be attributed per-model.
  #
  # Transport backend (2026-07-03): codex entries default to the `codex exec` CLI.
  # Add `backend: mcp` to route a codex reviewer through `codex mcp-server` instead
  # (CodexMcpAdapter, read-only sandbox). Opt-in for A/B against the CLI path;
  # keep the default CLI until MCP parity is confirmed (see log 20260702 Appendix F).
  - provider: codex
    model: gpt-5.5
    effort: medium
    role_label: codex_gpt5.5

  - provider: cursor
    role_label: cursor_composer2.5
    # No `model` key → cursor adapter omits --model → cursor's default (composer-2.5-fast as of 2026-05).
    # This entry preserves the original 5-reviewer roster behavior.

  # ----------------------------------------------------------------------
  # Multi-model cursor option (Phase 12 PR3-β, available since v3.22.1).
  # cursor_adapter passes --model when set. To run all reviewers via Cursor
  # (e.g., when only Cursor login is available), add entries below and
  # disable other providers' entries above. Models supported by `agent`
  # depend on your Cursor subscription/CLI version. Verified examples:
  #   - composer-2 (default; no --model needed)
  #   - gpt-5.4-high
  #   - claude-sonnet-4-6 (if available)
  # role_label is what shows up in convergence output.
  # ----------------------------------------------------------------------
  # - provider: cursor
  #   model: gpt-5.4-high
  #   role_label: cursor_gpt5.4
  # - provider: cursor
  #   model: claude-sonnet-4-6
  #   role_label: cursor_sonnet4.6

# Complexity → per-provider effort mapping.
# multi_llm_review tool auto-detects complexity from review_type + artifact size,
# or accepts an explicit `complexity` input. The mapped effort overrides the
# reviewer roster's default.
#
# Policy (2026-04-29): Reviewers stay at each LLM's DEFAULT effort regardless of
# review_type or artifact size. Cross-evaluation experiments showed reviewer
# verdict quality is effort-independent. Pushing reviewers above default wastes
# cost without quality gain. High effort is reserved for the post-aggregation
# REVISION phase (separate orchestrator action, not this SkillSet).
effort_map:
  low:
    claude_code: medium   # was: low — collapsed to default per new policy
    codex: medium
  medium:
    claude_code: medium
    codex: medium
  high:
    claude_code: medium   # was: high — reviewers stay at default
    codex: medium
  critical:
    claude_code: medium   # was: high — reviewers stay at default. critical work
                          # belongs in revision phase (high+directive+anti-enum),
                          # not in reviewer effort.
    codex: medium

# Auto-detection thresholds (used when complexity arg not given)
# Note: per the policy above, all complexity levels currently map to medium for
# reviewers. The thresholds remain so that explicit `complexity` inputs and
# future per-pool overrides (e.g. revision-phase callers) can still differentiate.
auto_complexity:
  small_artifact_chars: 500
  large_artifact_chars: 5000
  document_review_type: medium
  design_review_type: medium   # was: high — reviewers default per new policy

# Review context default
# 'independent' = reviewers don't see CLAUDE.md, project instructions
# 'project_aware' = reviewers see project context (use for project-specific reviews)
default_review_context: independent
